<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#112240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A192F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64FFDA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5EEAD4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Circle border -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#accentGradient)" stroke-width="4"/>
  
  <!-- Person silhouette -->
  <circle cx="200" cy="150" r="60" fill="#1A2F4A"/>
  <path d="M200 230 C120 230 80 280 80 340 L320 340 C320 280 280 230 200 230" fill="#1A2F4A"/>
  
  <!-- Initials -->
  <text x="200" y="170" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#64FFDA" text-anchor="middle">JF</text>
  
  <!-- Subtitle -->
  <text x="200" y="370" font-family="Inter, Arial, sans-serif" font-size="16" fill="#8892B0" text-anchor="middle">Full Stack Developer</text>
</svg>